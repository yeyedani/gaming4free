name: Gaming4free Auto Renew

on:
  schedule:
    - cron: '0 */1 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch:       # 保持手动触发，方便随时测试

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for PyAutoGUI/Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev xvfb x11-utils scrot

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 增加 --no-cache-dir 强制拉取最新包，彻底解决 Chrome 130+ 协议断连 Bug
        pip install --upgrade --no-cache-dir seleniumbase undetected-chromedriver requests pyautogui

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Xray-core)
      env:
        XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }} 
      run: |
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -q Xray-linux-64.zip -d xray
        chmod +x xray/xray
        
        printenv XRAY_CONFIG > xray/config.json
        
        nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
        sleep 5
        
        if ! pgrep -x "xray" > /dev/null; then
            echo "❌ Xray 进程未启动或已崩溃！查看报错日志："
            cat xray.log
            exit 1
        fi
        
        curl -il -x socks5://127.0.0.1:10808 https://api.ipify.org || (echo "❌ 代理测试失败，查看 Xray 日志:" && cat xray.log && exit 1)

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:10808
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        SERVERS: ${{ secrets.SERVERS }}  
      run: |
        # 增加 xvfb 视窗分辨率以确保验证码位于视野内
        xvfb-run --server-args="-screen 0 1280x720x24" -a python gaming4free.py
