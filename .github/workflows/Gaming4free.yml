name: Gaming4free Auto Renew

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch:       

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Xray-core)
      env:
        XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }} 
      run: |
        # 下载并解压 Xray-core
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -q Xray-linux-64.zip -d xray
        chmod +x xray/xray
        
        # 使用 printenv 完美写入配置，避免任何符号转义问题
        printenv XRAY_CONFIG > xray/config.json
        
        # 后台启动 Xray
        nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
        sleep 5
        
        # 检查 Xray 进程是否存活
        if ! pgrep -x "xray" > /dev/null; then
            echo "❌ Xray 进程未启动或已崩溃！查看报错日志："
            cat xray.log
            exit 1
        fi
        
        # 测试节点连通性
        curl -il -x socks5://127.0.0.1:10808 https://api.ipify.org || (echo "❌ 代理测试失败，查看 Xray 日志:" && cat xray.log && exit 1)

    - name: Run Script
      env:
        # 这里的端口必须对应 JSON 里的 "port": 10808
        PROXY: socks5://127.0.0.1:10808
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        SERVERS: ${{ secrets.SERVERS }}  
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python gaming4free.py
