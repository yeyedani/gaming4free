name: gaming4free renew (WARP + Python)

on:
  push:                # 新增这行，以后只要您修改代码，它就会立刻自动跑一次
  workflow_dispatch:
  schedule:
    - cron: "31 * * * *"   # 稍微改一下数字，比如改成 45

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1️⃣ 安装官方 WARP 客户端 (纯 SOCKS5 模式)
      # =========================
      - name: Setup Official WARP Proxy
        run: |
          # 导入 Cloudflare 官方源并安装
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 注册并设置为纯代理模式 (默认占用 40000 端口，绝不断网)
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          echo "⏳ 等待 WARP 隧道建立 (10秒)..."
          sleep 10

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          pip install seleniumbase SpeechRecognition pydub
          sbase install chromium

      # =========================
      # 🟡 2️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          
          echo "🌍 验证 WARP SOCKS5 代理 IP:"
          # 这次绝对能成功连上 40000 端口并打印出 WARP IP
          curl -s -x socks5://127.0.0.1:40000 https://api.ipify.org || echo "⚠️ IP获取失败"
          echo ""
          
          # 启动虚拟桌面并运行无敌的 Python 打码脚本
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
