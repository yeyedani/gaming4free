name: gaming4free renew (WARP + Python)

on:
  push:                # 新增这行，以后只要您修改代码，它就会立刻自动跑一次
  workflow_dispatch:
  schedule:
    - cron: "35 * * * *"   # 稍微改一下数字，比如改成 45

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: Setup Proxy Tunnel (Sing-box)
        env:
          PROXY_JSON: ${{ secrets.PROXY_JSON }}
        run: |
          wget https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar -xvf sing-box-1.9.0-linux-amd64.tar.gz
          sudo cp sing-box-1.9.0-linux-amd64/sing-box /usr/local/bin/
          
          echo "$PROXY_JSON" > config.json
          
          python -c "
          import json
          try:
              with open('config.json', 'r', encoding='utf-8') as f: data = json.load(f)
              
              # 🌟 终极白名单提取：只保留核心的 inbounds 和 outbounds，彻底杜绝所有 GUI 特有字段导致闪退！
              clean_data = {}
              if 'log' in data: clean_data['log'] = data['log']
              if 'inbounds' in data: clean_data['inbounds'] = data['inbounds']
              if 'outbounds' in data: clean_data['outbounds'] = data['outbounds']
              
              with open('config.json', 'w', encoding='utf-8') as f: json.dump(clean_data, f)
              print('JSON 终极白名单提取完成！当前为绝对纯净代理模式。')
          except Exception as e:
              print('JSON 修复失败:', e)
          "
          
          nohup sing-box run -c config.json > proxy.log 2>&1 &
          sleep 5
          cat proxy.log
          
          # 这一步只要能打印出你代理的 IP，就说明隧道 100% 打通了！
          curl -x socks5h://127.0.0.1:10808 https://ifconfig.me || echo "代理连接测试失败，但继续运行"

      - name: Run Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 -a 参数自动分配最佳的虚拟显示器编号，完美触发 SeleniumBase 的破盾模块
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
